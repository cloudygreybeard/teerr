name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    uses: cloudygreybeard/homebrew-tap/.github/workflows/release-homebrew-formula.yml@main
    with:
      package-name: teerr
      binary-name: teerr
      formula-class: Teerr
      formula-desc: "Copy stdin to stdout and stderr"
      artifact-style: goreleaser
      private: false
      install-extra: 'man1.install "teerr.1"'
      custom-test: |-
        output = pipe_output("#{bin}/teerr", "hello")
              assert_equal "hello", output.strip
    secrets:
      deploy-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
